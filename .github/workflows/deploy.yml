name: Deploy API

# Manual deploy: builds the API image, pushes to ACR, and deploys the Container App.
# Requires repo secrets: AZURE_CREDENTIALS (service principal), ACR_NAME, RESOURCE_GROUP.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag'
        required: false
        default: 'latest'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push image to ACR
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image sitos-api:${{ github.event.inputs.tag }} \
            --file server/Dockerfile \
            server

      - name: Update Container App
        run: |
          az containerapp update \
            --name sitos-api \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/sitos-api:${{ github.event.inputs.tag }}
