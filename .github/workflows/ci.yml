name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore server/Sitos.slnx
      - name: Build
        run: dotnet build server/Sitos.slnx -c Release --no-restore
      - name: Test
        run: dotnet test server/Sitos.Tests/Sitos.Tests.csproj -c Release --no-build

  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Pub get
        run: flutter pub get
        working-directory: app
      - name: Analyze
        run: flutter analyze
        working-directory: app
      - name: Test
        run: flutter test
        working-directory: app
