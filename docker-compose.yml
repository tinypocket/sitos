services:
  postgres:
    image: postgres:16
    container_name: sitos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sitos
      POSTGRES_PASSWORD: sitos_dev_pw
      POSTGRES_DB: sitos
    ports:
      - "5432:5432"
    volumes:
      - sitos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitos -d sitos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sitos_pgdata:
